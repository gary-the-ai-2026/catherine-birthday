<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Catherine!</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap");

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Lato", sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(128, 203, 196, 0.15) 0%, transparent 60%);
            animation: rotate 15s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 18px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: "Playfair Display", serif;
            font-size: 2.4rem;
            margin-bottom: 10px;
            color: #e0f2f1;
            line-height: 1.2;
        }
        
        .personal-message {
            font-size: 1.1rem;
            line-height: 1.5;
            margin: 15px 0 5px 0;
            color: #e0f2f1;
            font-style: italic;
        }

        .value {
            font-family: "Playfair Display", serif;
            font-size: 3.5rem;
            font-weight: 600;
            color: #fff;
            margin: 15px 0 25px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .details {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 0.95rem;
            text-align: left;
        }

        .details p {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 6px;
        }

        .details p:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .details strong {
            font-weight: 400;
            color: #80cbc4;
        }

        .sign-off {
            font-family: "Playfair Display", serif;
            font-size: 1.5rem;
            font-style: italic;
            margin-bottom: 30px;
            color: #e0f2f1;
        }

        .btn {
            display: inline-block;
            background: #fff;
            color: #0f2027;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .btn:hover {
            background: #e0f2f1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="content">
            <img src="https://www.bluelagoonfloatandspa.com.au/cdn/shop/files/BlueLagoonLogoTM_792e6fc2-edef-47d9-b604-c9ed229180fc_185x@2x.png?v=1681342543" alt="Blue Lagoon Float & Spa Logo" class="logo-img">
            <h1>Happy Birthday<br>Catherine!</h1>
            
            <p class="personal-message">"Happy Birthday sister. Enjoy some always needed relaxation time!"</p>
            
            <div class="value">$150</div>
            
            <div class="details">
                <p><strong>Certificate No.</strong> <span>#1386028</span></p>
                <p><strong>Validation Code</strong> <span>V820349</span></p>
                <p><strong>Expiry Date</strong> <span>10/05/2029</span></p>
            </div>

            <div class="sign-off">Lots of love,<br>Amy & Tim</div>
            
            <a href="https://www.bluelagoonfloatandspa.com.au" target="_blank" class="btn">Book Your Spa</a>
        </div>
    </div>
</body>
</html>
